<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training & Placement Cell Portal</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Add your CSS styles here */
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { background: #007BFF; color: white; padding: 10px; text-align: center; }
        .modal { display: none; position: fixed; z-index: 1; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgb(0,0,0); background-color: rgba(0,0,0,0.4); }
        .modal-content { background-color: #fefefe; margin: 15% auto; padding: 20px; border: 1px solid #888; width: 80%; }
        .close { color: #aaa; float: right; font-size: 28px; font-weight: bold; }
        .close:hover, .close:focus { color: black; text-decoration: none; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to the Training & Placement Cell Portal</h1>
    </header>
    <div id="main-content">
        <h2>Select an option</h2>
        <button id="adminModeBtn">Admin Mode</button>
        <button id="studentModeBtn">Student Mode</button>
    </div>
    <div id="adminModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeAdminModal">&times;</span>
            <h2>Admin Login</h2>
            <form id="adminLoginForm">
                <label for="adminUsername">Username:</label>
                <input type="text" id="adminUsername"><br><br>
                <label for="adminPassword">Password:</label>
                <input type="password" id="adminPassword"><br><br>
                <button type="button" id="submitAdminLogin">Login</button>
            </form>
        </div>
    </div>
    <script>
        document.getElementById('adminModeBtn').onclick = function() {
            document.getElementById('adminModal').style.display = 'block';
        };
        document.getElementById('closeAdminModal').onclick = function() {
            document.getElementById('adminModal').style.display = 'none';
        };
        window.onclick = function(event) {
            if (event.target == document.getElementById('adminModal')) {
                document.getElementById('adminModal').style.display = 'none';
            }
        };
    </script>
</body>
</html>
